name: Tests

on:
  push:
    branches: ["**"]
    paths:
      - "sollicitaties/dashboard.qmd"
      - "sollicitaties/tracker.yml"
      - "profiel.yml"
      - "scripts/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "sollicitaties/dashboard.qmd"
      - "sollicitaties/tracker.yml"
      - "profiel.yml"
      - "scripts/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml pandas matplotlib

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.39"

      # ── Static validation ─────────────────────────────────────────────────

      - name: Validate profiel.yml
        run: python scripts/validate_profiel.py

      - name: Validate tracker.yml schema
        run: python scripts/test_tracker.py

      - name: Check consistency (tracker vs folders)
        run: python scripts/check_consistency.py

      - name: Check application folders for required files
        run: |
          set -e
          MISSING=0
          for dir in sollicitaties/*/; do
            name=$(basename "$dir")
            [ "$name" = "_template" ] && continue
            for f in brief.qmd vacature.md; do
              if [ ! -f "$dir$f" ]; then
                echo "MISSING $f in $dir"
                MISSING=$((MISSING + 1))
              fi
            done
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "FAIL: $MISSING required file(s) missing"
            exit 1
          fi
          echo "OK: all application folders have required files"

      # ── Integration: status.py ────────────────────────────────────────────

      - name: Test status.py --list runs without error
        run: python scripts/status.py --list

      - name: Test status.py update and revert
        run: |
          set -e
          ID="2026-03-03_voorbeeld_innovatiemanager"

          python scripts/status.py "$ID" verstuurd --datum 2099-01-01 --notities "CI test"
          python - <<'PY'
          import yaml, sys
          with open("sollicitaties/tracker.yml") as f:
              data = yaml.safe_load(f)
          entry = next(a for a in data["applications"] if a["id"] == "2026-03-03_voorbeeld_innovatiemanager")
          assert entry["status"] == "verstuurd", f"Expected verstuurd, got {entry['status']}"
          assert entry["datum_verstuurd"] == "2099-01-01", f"Wrong date: {entry['datum_verstuurd']}"
          print("OK: status and date updated correctly")
          PY

          # Revert so tracker stays clean
          python scripts/status.py "$ID" concept

      # ── Integration: new_job.py ───────────────────────────────────────────

      - name: Test new_job.py creates folder and seeds tracker
        run: |
          set -e
          TEST_ID="2099-01-01_testbedrijf_testfunctie"
          python scripts/new_job.py "$TEST_ID"

          test -d "sollicitaties/$TEST_ID" || { echo "FAIL: folder not created"; exit 1; }
          echo "OK: folder created"

          python - <<'PY'
          import yaml, sys
          with open("sollicitaties/tracker.yml") as f:
              data = yaml.safe_load(f)
          entry = next((a for a in data["applications"] if a["id"] == "2099-01-01_testbedrijf_testfunctie"), None)
          if entry is None:
              print("FAIL: tracker entry not added")
              sys.exit(1)
          if entry["status"] != "concept":
              print(f"FAIL: expected concept, got {entry['status']}")
              sys.exit(1)
          print("OK: tracker entry is concept")
          PY

      # ── Integration: check_consistency after new_job.py ──────────────────

      - name: check_consistency passes after new_job.py ran
        run: python scripts/check_consistency.py

      # ── Integration: dashboard render ─────────────────────────────────────

      - name: Render dashboard.qmd
        working-directory: sollicitaties
        run: quarto render dashboard.qmd

      - name: Verify dashboard.html was created and is non-empty
        run: |
          set -e
          if [ ! -f sollicitaties/dashboard.html ]; then
            echo "FAIL: dashboard.html not found"
            exit 1
          fi
          SIZE=$(wc -c < sollicitaties/dashboard.html)
          if [ "$SIZE" -lt 10000 ]; then
            echo "FAIL: dashboard.html is suspiciously small ($SIZE bytes)"
            exit 1
          fi
          echo "OK: dashboard.html exists ($SIZE bytes)"

      # ── Final re-validation ───────────────────────────────────────────────

      - name: Final tracker.yml validation
        run: python scripts/test_tracker.py
