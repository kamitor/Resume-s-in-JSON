name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "sollicitaties/dashboard.qmd"
      - "sollicitaties/tracker.yml"
      - "profiel.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml pandas matplotlib

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.39"

      - name: Render dashboard
        working-directory: sollicitaties
        run: quarto render dashboard.qmd --output index.html

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy
          cp sollicitaties/index.html _deploy/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
