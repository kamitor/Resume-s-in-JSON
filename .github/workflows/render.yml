name: Render Letters

on:
  push:
    branches: [main]
    paths:
      - "sollicitaties/**/*.qmd"
      - "sollicitaties/tracker.yml"
      - "_stijl/**"
      - "profiel.yml"
      - "_quarto.yml"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml pandas matplotlib

      - name: Install XeLaTeX + required packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-extra \
            texlive-latex-extra \
            texlive-plain-generic

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.39"

      - name: Find and render all brief.qmd files
        run: |
          set -e
          find sollicitaties -name "brief.qmd" | while read qmd; do
            echo "Rendering: $qmd"
            quarto render "$qmd"
          done

      - name: Verify PDFs were created
        run: |
          set -e
          while IFS= read -r qmd; do
            dir=$(dirname "$qmd")
            if [ ! -f "$dir/brief.pdf" ]; then
              echo "MISSING PDF for: $qmd"
              exit 1
            else
              echo "OK: $dir/brief.pdf"
            fi
          done < <(find sollicitaties -name "brief.qmd")

      - name: Render dashboard
        run: quarto render sollicitaties/dashboard.qmd

      - name: Upload rendered letters
        uses: actions/upload-artifact@v4
        with:
          name: sollicitatiebrieven
          path: sollicitaties/**/brief.pdf
          if-no-files-found: warn

      - name: Upload dashboard
        uses: actions/upload-artifact@v4
        with:
          name: sollicitatie-dashboard
          path: sollicitaties/dashboard.html
          if-no-files-found: warn
